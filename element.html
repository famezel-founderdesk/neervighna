<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Details</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300..900;1,300..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ayur: { 
                            gold: '#d4af37',
                            green: '#2e7d32',
                            darkGreen: '#1b5e20',
                            cream: '#fcfbf7'
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #fcfbf7; 
            color: #1a1a1a; 
        }
        img { border-radius: 4px; }
    </style>
</head>

<body class="font-body antialiased relative">

    <script>
        // Element Data Configuration
        const doshaData = {
            vata: {
                title: "Vata",
                subtitle: "Air & Space",
                overlayClass: "bg-blue-100/10 border-blue-500/5",
                description: "Vata is the subtle energy associated with movement. It governs breathing, blinking, muscle and tissue movement, pulsation of the heart, and all movements in the cytoplasm and cell membranes.",
                balanced: [
                    "Highly creative, imaginative, and energetic mind.",
                    "Quick to learn and rapidly grasp new complex concepts.",
                    "Naturally joyful, enthusiastic, and highly flexible in daily life."
                ],
                imbalanced: [
                    "Prone to severe anxiety, worry, and overwhelming fear.",
                    "Experiences erratic digestion and frequent physical bloating.",
                    "Struggles with persistent insomnia and restless sleep patterns."
                ],
                imbalancedIcon: "fa-cloud"
            },
            pitta: {
                title: "Pitta",
                subtitle: "Fire & Water",
                overlayClass: "bg-red-100/10 border-red-500/5",
                description: "Pitta is the profound energy of digestion and metabolism. It governs all biochemical changes in the human body, expressing itself through body temperature, absorption, assimilation, and profound mental clarity.",
                balanced: [
                    "Highly intelligent, focused, and possesses a sharp memory.",
                    "Strong digestion, robust metabolism, and excellent energy levels.",
                    "Natural pathfinders, exhibiting excellent leadership and decision-making."
                ],
                imbalanced: [
                    "High susceptibility to sudden anger, irritability, and impatience.",
                    "Prone to systemic inflammation, skin rashes, and severe heartburn.",
                    "Can become overly demanding, critical, or rigidly perfectionistic."
                ],
                imbalancedIcon: "fa-fire-extinguisher"
            },
            kapha: {
                title: "Kapha",
                subtitle: "Earth & Water",
                overlayClass: "bg-green-100/10 border-green-500/5",
                description: "Kapha is the deep energy that forms the body's structure — bones, muscles, and tendons. It supplies the water for all bodily parts and systems, providing the ultimate stabilizing force.",
                balanced: [
                    "Naturally loving, calm, forgiving, and deeply compassionate.",
                    "Strong, healthy immune system and excellent physical stamina.",
                    "Provides immense stability and groundedness in relationships."
                ],
                imbalanced: [
                    "Tendency towards sluggishness, lethargy, and lack of motivation.",
                    "Prone to weight gain, water retention, and excessive mucus.",
                    "Can experience intense emotional attachment, stubbornness, or greed."
                ],
                imbalancedIcon: "fa-droplet-slash"
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Header & Footer Initialization
            fetch('header.html')
                .then(res => res.text())
                .then(data => {
                    document.body.insertAdjacentHTML('afterbegin', data);
                    if (typeof window.initHeader === 'function') window.initHeader();
                });
            fetch('footer.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('footer-container').innerHTML = data;
                });

            // Dynamic Content Loading
            const params = new URLSearchParams(window.location.search);
            const dosha = params.get('element') || 'vata'; // Default to Vata
            const data = doshaData[dosha];

            if(data) {
                document.title = `${data.title.toUpperCase()} - ${data.subtitle}`;
                document.getElementById('c-subtitle').innerText = data.subtitle.toUpperCase();
                document.getElementById('c-title').innerText = data.title;
                document.getElementById('c-overlay-subtitle').innerText = data.subtitle.toUpperCase();
                document.getElementById('c-overlay-title').innerText = data.title.toUpperCase();
                document.getElementById('c-desc').innerText = data.description;
                
                document.getElementById('c-overlay').className = `absolute inset-0 mix-blend-multiply border ${data.overlayClass}`;
                
                const balList = document.getElementById('c-balanced');
                balList.innerHTML = data.balanced.map(item => `<li class="flex items-start text-gray-700 font-light text-sm"><span class="w-1.5 h-1.5 rounded-full bg-ayur-green mt-1.5 mr-4 flex-shrink-0"></span> ${item}</li>`).join('');
                
                const imbalList = document.getElementById('c-imbalanced');
                imbalList.innerHTML = data.imbalanced.map(item => `<li class="flex items-start text-gray-500 font-light text-sm"><span class="w-1.5 h-1.5 bg-gray-300 mt-1.5 mr-4 flex-shrink-0"></span> ${item}</li>`).join('');

                document.getElementById('c-imbal-icon').className = `fa-solid ${data.imbalancedIcon} text-gray-300 mr-3`;
            }
        });
    </script>

    <main class="min-h-screen pt-32 pb-16 bg-ayur-cream">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
            
            <!-- Left Side Image Box -->
            <div class="relative w-full h-[500px] lg:h-[700px] rounded-sm shadow-[0_20px_50px_rgba(0,0,0,0.08)] group border border-gray-100 overflow-hidden bg-white">
                <img src="../../1.png" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-[2s] ease-out opacity-90" alt="Element Image">
                <div class="absolute inset-0 bg-gradient-to-t from-[#fcfbf7] via-transparent to-[#fcfbf7]/20"></div>
                <!-- Dynamic Overlay Color -->
                <div id="c-overlay" class="absolute inset-0 mix-blend-multiply border"></div>
                
                <div class="absolute bottom-10 left-10 z-10">
                    <div id="c-overlay-subtitle" class="text-gray-600 text-[10px] tracking-[0.5em] font-semibold mb-2">LOADING</div>
                    <div id="c-overlay-title" class="text-gray-900 text-3xl font-heading tracking-widest uppercase">LOADING</div>
                </div>
            </div>

            <!-- Right Side Content -->
            <div class="flex flex-col">
                <span id="c-subtitle" class="text-ayur-darkGreen font-semibold tracking-[0.4em] uppercase text-xs md:text-sm mb-4 block">LOADING</span>
                <h1 id="c-title" class="text-6xl lg:text-8xl font-heading mb-8 font-light italic text-gray-900">Loading</h1>
                
                <p id="c-desc" class="text-gray-600 text-sm lg:text-base leading-relaxed mb-12 font-light border-l border-ayur-darkGreen/20 pl-6">
                    Loading description...
                </p>

                <div class="space-y-12">
                    <!-- Advantages (In Balance) -->
                    <div>
                        <h3 class="text-lg font-heading text-gray-900 mb-6 uppercase tracking-widest border-b border-gray-200 pb-4"><i class="fa-solid fa-seedling text-ayur-green mr-3"></i> Balanced State</h3>
                        <ul id="c-balanced" class="space-y-5">
                            <!-- Dynamics li -->
                        </ul>
                    </div>

                    <!-- Disadvantages (Out of Balance) -->
                    <div>
                        <h3 class="text-lg font-heading text-gray-900 mb-6 uppercase tracking-widest border-b border-gray-200 pb-4"><i id="c-imbal-icon" class="fa-solid fa-cloud text-gray-300 mr-3"></i> Imbalanced State</h3>
                        <ul id="c-imbalanced" class="space-y-5">
                            <!-- Dynamics li -->
                        </ul>
                    </div>
                </div>

                <div class="mt-16">
                    <a href="index.html#philosophy" class="inline-flex items-center px-8 py-3 bg-ayur-darkGreen text-white hover:bg-gray-900 transition-all duration-300 text-xs tracking-widest uppercase font-semibold rounded-sm">
                        <i class="fa-solid fa-arrow-left-long mr-3"></i> Return to Map
                    </a>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-container"></div>
</body>

</html>
